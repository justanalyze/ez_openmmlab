val_ann_path = "tests/data/coco_mini/annotations/train.json"
val_img_path = "tests/data/coco_mini/images"

[training]
epochs = 100
batch_size = 2
num_workers = 2
learning_rate = 0.001
weight_decay = 0.05
device = "cpu"
work_dir = "./runs/rtmdet_sample_training_v3"
log_level = "INFO"
enable_tensorboard = false
amp = false
evaluator_metric = "CocoMetric"
resume = false
stage2_num_epochs = 50

[augments]
scale_factor = [
    0.567,
    1.523,
]
random_flip_prob = 0.432
