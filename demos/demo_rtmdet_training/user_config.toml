[model]
name = "rtmdet_tiny"
num_classes = 80
load_from = "/home/just/.cache/ez_openmmlab/checkpoints/rtmdet_tiny.pth"
base_config_path = "/home/just/Projects/ez_openmmlab/libs/mmdetection/configs/rtmdet/rtmdet_tiny_8xb32-300e_coco.py"
input_size = [
    320,
    320,
]

[data]
root = "tests/data/coco_mini"
dataset_name = "COCO_Mini"
registered_class_name = "COCO_Mini"
train_ann = "annotations/train.json"
train_img = "images"
val_ann = "annotations/train.json"
